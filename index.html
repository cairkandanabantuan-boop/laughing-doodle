<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tes Install Aplikasi</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00B4D8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0077B6;
      position: relative;
    }

    /* Animasi Gelombang Air */
    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 100px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%2390E0EF"/><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%2390E0EF"/><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%2390E0EF"/></svg>') repeat-x;
      animation: wave 10s linear infinite;
    }
    .wave2 {
      bottom: 10px;
      opacity: 0.5;
      animation: wave 15s linear infinite reverse;
    }
    @keyframes wave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .box {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      padding: 30px 25px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 90%;
      z-index: 10;
      position: relative;
    }
    .box h3 { 
      font-weight: bold; 
      font-size: 24px; 
      color: #023E7D; 
      margin-bottom: 10px;
    }
    .box p { 
      font-size: 15px; 
      color: #03045E; 
      line-height: 1.6;
    }
    #installBtn {
      width: 100%;
      height: 48px;
      background: linear-gradient(90deg, #00B4D8, #0077B6);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-top: 20px;
      display: none;
      transition: 0.3s;
    }
    #installBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,180,216,0.4);
    }
    .logo { 
      text-align: center; 
      margin-bottom: 15px; 
    }
    .logo img {
      border-radius: 50%;
      border: 4px solid #00B4D8;
      box-shadow: 0 0 15px rgba(0,180,216,0.5);
    }
  </style>
</head>
<body>
  <div class="wave"></div>
  <div class="wave wave2"></div>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00B4D8">
  <div class="box">
    <div class="logo">
      <img src="logo.png" alt="Logo" width="100" height="100">
    </div>
    <h3>Tes Install Aplikasi</h3>
    <p>Background air biar adem liatnya<br>
    Klik tombol di bawah untuk install ke HP kamu</p>
    <button id="installBtn">Install Aplikasi</button>
    <p style="font-size:12px; color:#555; margin-top:15px;">Buka di Chrome Android agar tombol muncul</p>
  </div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>
<script>
// Daftarkan Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  }
});
</script>
</body>
</html>
